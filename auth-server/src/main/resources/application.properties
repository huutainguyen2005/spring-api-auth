spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=sba301_authserver;encrypt=false;
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.hbm2ddl.auto=update
# create -> tao cÃc bang theo th¶ng tin tu @Entity
# create-drop -> tuong tu nhung se xoÃ khi app dung
# none -> ko lÁm gš (DB first approach)
# Th¶ng thuong khi moi khoi tao du Ãn theo code-first -> chon create-drop
# DB on dinh roi -> chuyen ve create/update -> none

# 1 so log level de debug
logging.level.org.springframework.security=DEBUG
