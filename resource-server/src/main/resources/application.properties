spring.application.name=resource-server

  # Datasource
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=chinook;encrypt=false;
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
  
  # JPA / Hibernate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.properties.hibernate.show_sql=true
  
  # DevTools
spring.devtools.restart.enabled=true
spring.devtools.restart.exclude=static/**,public/**
spring.devtools.livereload.enabled=true
  
  # SpringDoc / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

  # Resource server nay` chap nhan cac token API cua auth-server.vn:8081
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://auth-server.vn:8081
