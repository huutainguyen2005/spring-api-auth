 # Datasource
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=chinook;encrypt=false;
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
  
  # JPA / Hibernate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.properties.hibernate.show_sql=true
  
  # DevTools
spring.devtools.restart.enabled=true
spring.devtools.restart.exclude=static/**,public/**
spring.devtools.livereload.enabled=true
  
  # SpringDoc / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.application.name=resource-server
  # Cau hinh port
  # Resource Server -> 8080
  # Auth Server -> 8081
server.port=8081
  
  # Cau hinh Auth Server
  # Issuer
spring.security.oauth2.authorizationserver.issuer=http://auth-server.vn:8081
  
  # Client 1 registration 'feclient`
spring.security.oauth2.authorizationserver.client.feclient.registration.client-id=feclient
spring.security.oauth2.authorizationserver.client.feclient.registration.client-secret=feclient
spring.security.oauth2.authorizationserver.client.feclient.registration.client-authentication-methods=client_secret_basic
spring.security.oauth2.authorizationserver.client.feclient.registration.authorization-grant-types=authorization_code,refresh_token
spring.security.oauth2.authorizationserver.client.feclient.registration.redirect-uris=XXX
spring.security.oauth2.authorizationserver.client.feclient.registration.scopes=openid,profile,email
